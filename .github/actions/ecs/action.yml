name: Deploy to Amazon ECS
description: 'Deploy a container to Amazon ECS service'

inputs:
  cluster-name:
    description: "Amazon ECS cluster name"
    required: true
  service:
    description: 'ECS Service name'
    required: true
  image:
    description: "Docker image to deploy"
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      run: |
        if [ -z "${{ inputs.service }}" ]; then
          echo "ERROR: service input is empty"
          exit 1
        fi
      shell: bash
    
    - name: Force new deployment on Amazon ECS service
      run: aws ecs update-service --cluster ${{ inputs.cluster-name }} --service ${{ inputs.service }} --force-new-deployment
      shell: bash