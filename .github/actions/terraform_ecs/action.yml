name: 'Terraform Action'
description: 'Reusable GitHub Action for Terraform operations'

inputs:
  environment:
    description: 'Deployment environment'
    required: true

outputs:
  cluster-name:
    description: 'ECS Cluster Name'
    value: ${{ steps.outputs.outputs.cluster-name }}
  app:
    description: 'ECS Service Name'
    value: ${{ steps.outputs.outputs.app }}

runs:
  using: "composite"
  steps:
    - name: Terraform Init
      run: terraform init -upgrade -backend-config="key=state/${{ inputs.environment }}/terraform.tfstate"
      shell: bash
      working-directory: './infra'

    - name: Terraform Format
      run: terraform fmt 
      shell: bash
      working-directory: './infra'

    - name: Terraform Plan
      run: terraform plan -input=false
      shell: bash
      working-directory: './infra'

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false
      shell: bash
      working-directory: './infra'

    - name: Set Outputs
      id: outputs
      run: |
        echo "cluster-name=$(terraform output -json ecs_info | jq -r '.ecs_cluster_1.cluster_name')" >> $GITHUB_OUTPUT
        echo "app=$(terraform output -json ecs_info | jq -r '.ecs_cluster_1.services.service_1.service_name')" >> $GITHUB_OUTPUT
      shell: bash
      working-directory: './infra'

